<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hideout After Hours · by Les Fleurs</title>
  <meta name="description" content="Hideout × Les Fleurs — After Hours. Coffee, wine, flowers & Italian aperitivo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Order Online — revealed by app.js only when window.ORDER_ONLINE_URL is set -->
  <a class="order-fab" data-order-link hidden target="_blank" rel="noopener" aria-label="Order online">Order Online</a>

  <!-- HERO -->
  <header class="hero" id="top">
    <div class="hero-glow" aria-hidden="true"></div>
    <div class="hero-lockup">
      <p class="h-hideout">HIDEOUT</p>
      <h1 class="h-after">AFTER HOURS</h1>
      <p class="h-by">by</p>
      <p class="h-les">LES FLEURS</p>
      <p class="h-sub">COFFEE &bull; WINE &bull; FLOWERS &bull; ITALIAN APERITIVO</p>
      <a class="order-cta" data-order-link hidden target="_blank" rel="noopener">Order Online</a>
    </div>
    <a class="hero-scroll" href="#pinsa" aria-label="View the menu">
      <span>MENU</span>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </a>
  </header>

  <!-- SECTION NAV -->
  <nav class="section-nav" id="section-nav" aria-label="Menu sections"></nav>

  <!-- MENU -->
  <main class="menu" id="menu"></main>

  <!-- FOOTER -->
  <footer class="foot">
    <div class="frule">
      <span class="ln"></span>
      <svg class="rose" viewBox="0 0 40 48" fill="none" stroke="#c77b53" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 23 C13 23 14 13 20 9 C26 13 27 23 20 23 Z"/>
        <path d="M20 23 C17 17 18 12 20 9.5"/>
        <path d="M20 23 C23 17 22 12 20 9.5"/>
        <path d="M14.5 19 C16 21 18 22 20 22.5"/>
        <path d="M25.5 19 C24 21 22 22 20 22.5"/>
        <path d="M20 23 L20 40"/>
        <path d="M20 30 C15.5 28.5 12.5 30 11 33.5 C15 34.5 18 33 20 31"/>
        <path d="M20 33 C24.5 31.5 27.5 33 29 36.5 C25 37.5 22 36 20 34"/>
      </svg>
      <span class="ln"></span>
    </div>
    <p class="f-brand">HIDEOUT &nbsp;&times;&nbsp; LES FLEURS</p>
    <p class="f-tag">A COLLABORATION INSPIRED BY COFFEE, FLOWERS AND ITALIAN APERITIVO CULTURE</p>
    <p class="f-tag two">GOOD COMPANY. &nbsp; GOOD DRINKS. &nbsp; GOOD VIBES.</p>
  </footer>

  <!-- BUILD-A-BOARD BAR -->
  <div class="board-bar" id="board-bar" hidden>
    <div class="bb-inner">
      <span class="bb-label">YOUR BOARD</span>
      <span class="bb-detail" id="bb-detail">Warm focaccia base</span>
      <span class="bb-total" id="bb-total">$10</span>
      <button class="bb-reset" id="bb-reset" type="button">Reset</button>
    </div>
  </div>

  <script src="menu-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
